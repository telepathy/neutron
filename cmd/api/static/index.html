<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>neutron</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 15px; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            background: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* --- Nav --- */
        nav {
            background: #111827;
            padding: 0 32px;
            display: flex;
            align-items: center;
            height: 52px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .brand {
            font-weight: 700;
            font-size: 1.15rem;
            color: #fff;
            text-decoration: none;
            letter-spacing: .5px;
            margin-right: 36px;
        }
        nav .brand:hover { color: #60a5fa; text-decoration: none; }
        nav a {
            color: #9ca3af;
            font-size: .9rem;
            font-weight: 500;
            margin-right: 24px;
            text-decoration: none;
            transition: color .15s;
        }
        nav a:hover { color: #fff; text-decoration: none; }

        /* --- Layout --- */
        .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

        /* --- Hero --- */
        .hero { text-align: center; padding: 64px 0 40px; }
        .hero h1 { font-size: 3rem; font-weight: 800; color: #111827; letter-spacing: -1px; }
        .hero p { font-size: 1.15rem; color: #6b7280; margin-top: 8px; }
        .arch-banner { background: #f0fdf4; padding: 24px 0; text-align: center; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; }
        .arch-banner img { max-width: 480px; width: 60%; height: auto; }

        /* --- Steps --- */
        .steps-title { text-align: center; font-size: 1.3rem; font-weight: 600; color: #374151; margin: 48px 0 32px; }
        .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-bottom: 64px; }
        .step { text-align: center; }
        .step-num { font-size: 2.4rem; font-weight: 800; color: #2563eb; margin-bottom: 12px; }
        .step p { color: #4b5563; font-size: .95rem; margin-top: 6px; }
        .step pre {
            text-align: left; background: #f9fafb; border: 1px solid #e5e7eb;
            border-radius: 8px; padding: 16px; font-size: .82rem; margin-top: 12px;
            overflow-x: auto; line-height: 1.5;
        }

        /* --- Footer --- */
        .footer { text-align: center; padding: 32px 0; color: #9ca3af; font-size: .85rem; border-top: 1px solid #f3f4f6; margin-top: 32px; }

        /* --- Card --- */
        .card {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 28px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
        }
        .card h3 { font-size: 1.15rem; font-weight: 700; color: #111827; margin-bottom: 16px; }

        /* --- Meta rows --- */
        .meta { margin-bottom: 20px; }
        .meta div { color: #4b5563; font-size: .95rem; margin-bottom: 4px; }
        .meta b { color: #111827; }
        .stat-row { display: flex; gap: 32px; margin: 16px 0; }
        .stat { font-size: .9rem; color: #6b7280; }
        .stat b { color: #111827; font-size: 1.05rem; }

        /* --- Table --- */
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th { text-align: left; font-size: .8rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; border-bottom: 2px solid #e5e7eb; }
        td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; font-size: .92rem; }
        tr:hover td { background: #f9fafb; }
        td a { font-weight: 500; }

        /* --- Form --- */
        .form-wrap { max-width: 480px; }
        .form-wrap h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; }
        label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin-bottom: 6px; margin-top: 16px; }
        label:first-child { margin-top: 0; }
        input[type="text"], select {
            width: 100%; padding: 10px 12px; font-size: .95rem;
            border: 1px solid #d1d5db; border-radius: 8px;
            background: #fff; color: #111827;
            transition: border-color .15s;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        input[type="text"]::placeholder { color: #9ca3af; }

        /* --- Buttons --- */
        .btn {
            display: inline-block; padding: 10px 24px; font-size: .92rem; font-weight: 600;
            border: none; border-radius: 8px; cursor: pointer;
            transition: background .15s, box-shadow .15s;
        }
        .btn-primary { background: #2563eb; color: #fff; margin-top: 24px; }
        .btn-primary:hover { background: #1d4ed8; box-shadow: 0 2px 8px rgba(37,99,235,.25); }
        .btn-outline { background: #fff; color: #374151; border: 1px solid #d1d5db; }
        .btn-outline:hover { background: #f9fafb; border-color: #9ca3af; }

        /* --- Success message --- */
        .success-box {
            max-width: 520px; margin: 48px auto; text-align: center;
            background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 32px;
        }
        .success-box h4 { color: #15803d; font-size: 1.15rem; margin-bottom: 12px; }
        .success-box p { color: #374151; font-size: .95rem; margin-bottom: 8px; }
        .webhook-url {
            background: #fff; border: 1px solid #d1d5db; border-radius: 8px;
            padding: 12px 16px; font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, monospace;
            font-size: .88rem; margin: 16px 0; word-break: break-all; color: #111827;
        }

        /* --- External log link hint --- */
        .log-hint { color: #6b7280; font-size: .82rem; margin: 12px 0 0; }

        /* --- Page title --- */
        .page-title { font-size: 1.3rem; font-weight: 700; color: #111827; margin-bottom: 24px; }
        .page-title b { color: #2563eb; }

        /* --- Responsive --- */
        @media (max-width: 640px) {
            .steps { grid-template-columns: 1fr; }
            .stat-row { flex-direction: column; gap: 8px; }
            .hero h1 { font-size: 2.2rem; }
            nav { padding: 0 16px; }
            .container { padding: 24px 16px; }
        }
    </style>
</head>
<body>
<nav>
    <a class="brand" href="#/">neutron</a>
    <a href="#/register">Register</a>
</nav>
<div id="app" class="container"></div>
<script>
(function() {
    var app = document.getElementById('app');
    var appConfig = { logUrl: '', namespace: 'default' };

    // --- Config ---
    fetch('/api/config').then(function(r){ return r.json(); }).then(function(c){
        appConfig.logUrl = c.logUrl || '';
        appConfig.namespace = c.namespace || 'default';
    });

    function buildLogUrl(podName) {
        if (!appConfig.logUrl) return '#';
        return appConfig.logUrl.replace('{namespace}', encodeURIComponent(appConfig.namespace)).replace('{podName}', encodeURIComponent(podName));
    }

    function isPodLogExpired(podName) {
        // Pod name format: neutron-{jobName}-{YYYYMMDD-HHMMSS}
        var match = podName.match(/(\d{8}-\d{6})$/);
        if (!match) return false;
        var ts = match[1];
        var y = parseInt(ts.substring(0, 4), 10);
        var m = parseInt(ts.substring(4, 6), 10) - 1;
        var d = parseInt(ts.substring(6, 8), 10);
        var hh = parseInt(ts.substring(9, 11), 10);
        var mm = parseInt(ts.substring(11, 13), 10);
        var ss = parseInt(ts.substring(13, 15), 10);
        var podDate = new Date(y, m, d, hh, mm, ss);
        var diff = Date.now() - podDate.getTime();
        return diff > 7 * 24 * 60 * 60 * 1000;
    }

    function openPodLog(podName) {
        if (!appConfig.logUrl) return;
        if (isPodLogExpired(podName)) {
            alert('非常抱歉，超过7日的日志已被清理，无法查看');
            return;
        }
        window.open(buildLogUrl(podName), '_blank');
    }
    window.openPodLog = openPodLog;

    // --- Router ---
    function route() {
        var hash = location.hash || '#/';
        app.innerHTML = '';
        window.scrollTo(0, 0);

        if (hash === '#/' || hash === '#') {
            renderHome();
        } else if (hash === '#/register') {
            renderRegister();
        } else if (hash.startsWith('#/register/success?')) {
            renderRegisterInfo();
        } else if (hash.startsWith('#/status/')) {
            renderStatus(hash.slice('#/status/'.length));
        } else {
            renderHome();
        }
    }

    window.addEventListener('hashchange', route);
    window.addEventListener('DOMContentLoaded', route);

    // --- Home ---
    function renderHome() {
        app.innerHTML =
            '<div class="hero">' +
                '<h1>neutron</h1>' +
                '<p>a lightweight pipeline system based on kubernetes</p>' +
            '</div>' +
            '<div class="arch-banner">' +
                '<img src="/static/arch.svg" alt="neutron architecture">' +
            '</div>' +
            '<div class="container" style="padding-top:0">' +
                '<p class="steps-title">Enjoy neutron pipeline in 3 steps</p>' +
                '<div class="steps">' +
                    '<div class="step">' +
                        '<p class="step-num">1</p>' +
                        'Define a pipeline with <b>neutron.yaml</b>' +
                        '<pre>jobs:\n  neutron-build:\n    image: "golang:latest"\n    trigger: ["MR","PUSH"]\n    steps:\n      - name: "build"\n        cmd: "make cli api"</pre>' +
                    '</div>' +
                    '<div class="step">' +
                        '<p class="step-num">2</p>' +
                        '<p>Register a new pipeline in neutron system.</p>' +
                        '<p>Add neutron public key to your code base.</p>' +
                        '<a href="#/register" class="btn btn-primary" style="margin-top:16px">Create pipeline</a>' +
                    '</div>' +
                    '<div class="step">' +
                        '<p class="step-num">3</p>' +
                        '<p>Configure webhook trigger.</p>' +
                        '<p>PUSH, MERGE and TAG are supported now.</p>' +
                    '</div>' +
                '</div>' +
                '<div class="footer">Designed with &hearts; by Shi Mengjie. Licensed under the GPLv3 License.</div>' +
            '</div>';
    }

    // --- Register ---
    function renderRegister() {
        app.innerHTML =
            '<div class="form-wrap">' +
                '<h3>Create new pipeline</h3>' +
                '<form id="registerForm">' +
                    '<label for="webhookType">Type</label>' +
                    '<select id="webhookType" name="webhookType">' +
                        '<option value="GitLab">GitLab</option>' +
                    '</select>' +
                    '<label for="repoUrl">Repo URL (SSH protocol only)</label>' +
                    '<input type="text" id="repoUrl" name="repoUrl" placeholder="git@gitlab.example.com:group/project.git">' +
                    '<button class="btn btn-primary" type="submit">Create pipeline</button>' +
                '</form>' +
            '</div>';

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var webhookType = document.getElementById('webhookType').value;
            var repoUrl = document.getElementById('repoUrl').value;
            if (!repoUrl) { alert('Please enter a repo URL'); return; }

            var body = 'webhookType=' + encodeURIComponent(webhookType) + '&repoUrl=' + encodeURIComponent(repoUrl);
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) { alert('Error: ' + data.error); return; }
                sessionStorage.setItem('registerResult', JSON.stringify(data));
                location.hash = '#/register/success?done';
            })
            .catch(function(err) { alert('Request failed: ' + err); });
        });
    }

    // --- Register Info ---
    function renderRegisterInfo() {
        var raw = sessionStorage.getItem('registerResult');
        if (!raw) { location.hash = '#/register'; return; }
        var data = JSON.parse(raw);

        app.innerHTML =
            '<div class="success-box">' +
                '<h4>New Pipeline Created</h4>' +
                '<p>You have created a <b>' + escHtml(data.webhookType) + '</b> pipeline for project <b>' + escHtml(data.repoUrl) + '</b>.</p>' +
                '<p><b>ATTENTION: this page will not show again!</b> Please copy following webhook url.</p>' +
                '<div class="webhook-url" id="webhookUrl">' + escHtml(data.webhookUrl) + '</div>' +
                '<button class="btn btn-outline" id="copyBtn">Copy</button>' +
            '</div>';

        document.getElementById('copyBtn').addEventListener('click', function() {
            var btn = this;
            navigator.clipboard.writeText(data.webhookUrl).then(function() {
                btn.textContent = 'Copied';
            }).catch(function() {
                var range = document.createRange();
                range.selectNode(document.getElementById('webhookUrl'));
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
            });
        });

        sessionStorage.removeItem('registerResult');
    }

    // --- Status ---
    function renderStatus(jobName) {
        app.innerHTML =
            '<p class="page-title">Loading status for <b>' + escHtml(jobName) + '</b>...</p>';

        fetch('/api/status/' + encodeURIComponent(jobName))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    app.innerHTML = '<p class="page-title">Error</p><p>' + escHtml(data.error) + '</p>';
                    return;
                }
                if (data.source === 'database') {
                    renderStatusSolid(jobName, data.status, data.pods || []);
                } else {
                    renderStatusLive(data.job, data.pods);
                }
            })
            .catch(function(err) {
                app.innerHTML = '<p class="page-title">Error</p><p>' + escHtml(String(err)) + '</p>';
            });
    }

    function renderStatusSolid(jobName, status, pods) {
        var podsHtml = '';
        for (var i = 0; i < pods.length; i++) {
            if (appConfig.logUrl) {
                podsHtml += '<tr><td><a href="javascript:void(0)" onclick="openPodLog(\'' + escAttr(pods[i].Name) + '\')">' + escHtml(pods[i].Name) + '</a></td><td>' + escHtml(pods[i].Status) + '</td></tr>';
            } else {
                podsHtml += '<tr><td>' + escHtml(pods[i].Name) + '</td><td>' + escHtml(pods[i].Status) + '</td></tr>';
            }
        }

        app.innerHTML =
            '<p class="page-title">Job &mdash; <b>' + escHtml(jobName) + '</b></p>' +
            '<div class="card">' +
                '<div class="meta">' +
                    '<div>A <b>' + escHtml(status.WebhookType) + '</b> &rarr; <b>' + escHtml(status.TriggerType) + '</b> pipeline</div>' +
                    '<div><a target="_blank" href="' + escAttr(status.ProjectUrl) + '">' + escHtml(status.RepoUrl) + '</a></div>' +
                '</div>' +
                '<div class="stat-row">' +
                    '<div class="stat">Active: <b>' + (status.Active || 0) + '</b></div>' +
                    '<div class="stat">Succeeded: <b>' + (status.Succeeded || 0) + '</b></div>' +
                    '<div class="stat">Failed: <b>' + (status.Failed || 0) + '</b></div>' +
                '</div>' +
                (pods.length > 0 ?
                    '<table><thead><tr><th>Pod</th><th>Status</th></tr></thead><tbody>' + podsHtml + '</tbody></table>'
                    : '<p style="color:#6b7280;margin-top:12px">No pods recorded.</p>') +
                (appConfig.logUrl ? '<p class="log-hint">Click pod name to view logs on external platform</p>' : '') +
            '</div>';
    }

    function renderStatusLive(job, podsData) {
        var ann = job.ObjectMeta && job.ObjectMeta.Annotations ? job.ObjectMeta.Annotations : {};
        var st = job.Status || {};
        var items = podsData && podsData.Items ? podsData.Items : [];

        var podsHtml = '';
        for (var i = 0; i < items.length; i++) {
            var pod = items[i];
            var name = pod.ObjectMeta ? pod.ObjectMeta.Name : '';
            var phase = pod.Status ? pod.Status.Phase : '';
            if (appConfig.logUrl) {
                podsHtml += '<tr><td><a href="javascript:void(0)" onclick="openPodLog(\'' + escAttr(name) + '\')">' + escHtml(name) + '</a></td><td>' + escHtml(phase) + '</td></tr>';
            } else {
                podsHtml += '<tr><td>' + escHtml(name) + '</td><td>' + escHtml(phase) + '</td></tr>';
            }
        }

        app.innerHTML =
            '<p class="page-title">Job &mdash; <b>' + escHtml(job.ObjectMeta ? job.ObjectMeta.Name : '') + '</b></p>' +
            '<div class="card">' +
                '<div class="meta">' +
                    '<div>A <b>' + escHtml(ann.sourceType || '') + '</b> &rarr; <b>' + escHtml(ann.triggerType || '') + '</b> pipeline</div>' +
                    '<div><a target="_blank" href="' + escAttr(ann.sourceLink || '#') + '">' + escHtml(ann.gitPath || '') + '</a></div>' +
                '</div>' +
                '<div class="stat-row">' +
                    '<div class="stat">Active: <b>' + (st.Active || 0) + '</b></div>' +
                    '<div class="stat">Succeeded: <b>' + (st.Succeeded || 0) + '</b></div>' +
                    '<div class="stat">Failed: <b>' + (st.Failed || 0) + '</b></div>' +
                '</div>' +
                (items.length > 0 ?
                    '<table><thead><tr><th>Pod</th><th>Status</th></tr></thead><tbody>' + podsHtml + '</tbody></table>'
                    : '<p style="color:#6b7280;margin-top:12px">No pods found.</p>') +
                (appConfig.logUrl ? '<p class="log-hint">Click pod name to view logs on external platform</p>' : '') +
            '</div>';
    }

    // --- Utils ---
    function escHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(String(s)));
        return d.innerHTML;
    }

    function escAttr(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
})();
</script>
</body>
</html>
