<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>neutron</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 10px; }
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            font-size: 1.6rem;
            color: #606c76;
            background: #fff;
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4, h5, h6 { color: #222; font-weight: 300; margin-bottom: 1rem; }
        h1 { font-size: 3.2rem; }
        h2 { font-size: 2.8rem; }
        h3 { font-size: 2.4rem; }
        h4 { font-size: 2rem; }
        strong, b { color: #222; font-weight: 700; }
        a { color: #9b4dca; text-decoration: none; }
        a:hover { color: #7b2fa0; text-decoration: underline; }

        /* --- Nav --- */
        nav {
            background: #f4f5f6;
            padding: 0 32px;
            display: flex;
            align-items: center;
            height: 54px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #d1d1d1;
        }
        nav .brand {
            font-weight: 700;
            font-size: 1.8rem;
            color: #606c76;
            text-decoration: none;
            letter-spacing: .3px;
            margin-right: 36px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        nav .brand:hover { color: #9b4dca; text-decoration: none; }
        nav .logo { width: 28px; height: 28px; }
        nav a {
            color: #606c76;
            font-size: 1.4rem;
            font-weight: 600;
            margin-right: 24px;
            text-decoration: none;
            transition: color .15s;
        }
        nav a:hover { color: #9b4dca; text-decoration: none; }

        /* --- Layout --- */
        .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

        /* --- Hero --- */
        .hero { text-align: center; padding: 80px 0 40px; }
        .hero .hero-logo { width: 80px; height: 80px; margin-bottom: 16px; }
        .hero h1 { font-size: 4.8rem; font-weight: 300; color: #222; letter-spacing: -1px; margin-bottom: .4rem; }
        .hero p { font-size: 1.8rem; color: #999; margin-top: 0; }
        .arch-banner { background: #f0fdf4; padding: 24px 0; text-align: center; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; }
        .arch-banner img { max-width: 480px; width: 60%; height: auto; }

        /* --- Steps --- */
        .steps-title { text-align: center; font-size: 2rem; font-weight: 300; color: #222; margin: 48px 0 32px; }
        .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-bottom: 64px; }
        .step { text-align: center; }
        .step-num { font-size: 3.2rem; font-weight: 300; color: #9b4dca; margin-bottom: 12px; }
        .step p { color: #606c76; font-size: 1.4rem; margin-top: 6px; }
        .step pre {
            text-align: left; background: #f9fafb; border: 1px solid #e5e7eb;
            border-radius: 4px; padding: 16px; font-size: 1.3rem; margin-top: 12px;
            overflow-x: auto; line-height: 1.5;
        }

        /* --- Footer --- */
        .footer { text-align: center; padding: 32px 0; color: #999; font-size: 1.3rem; border-top: 1px solid #f3f4f6; margin-top: 32px; }

        /* --- Card --- */
        .card {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
            padding: 20px 24px; margin-bottom: 24px;
        }

        /* --- Meta rows --- */
        .meta { margin-bottom: 20px; }
        .meta div { color: #606c76; font-size: 1.4rem; margin-bottom: 4px; }
        .meta b { color: #222; }
        .stat-row { display: flex; gap: 32px; margin: 16px 0; }
        .stat { font-size: 1.4rem; color: #606c76; }
        .stat b { color: #222; font-size: 1.4rem; }

        /* --- Table --- */
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th { text-align: left; font-size: 1.3rem; font-weight: 600; color: #222; padding: 10px 12px; border-bottom: 2px solid #e5e7eb; }
        td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; font-size: 1.4rem; color: #606c76; }
        tr:hover td { background: #f9fafb; }
        td a { font-weight: 600; }

        /* --- Form --- */
        .form-wrap { max-width: 480px; }
        .form-wrap h3 { margin-bottom: 24px; }
        label { display: block; font-size: 1.3rem; font-weight: 600; color: #222; margin-bottom: 6px; margin-top: 16px; }
        label:first-child { margin-top: 0; }
        input[type="text"], select {
            width: 100%; padding: 10px 12px; font-size: 1.4rem;
            border: 1px solid #d1d5db; border-radius: 4px;
            background: #fff; color: #606c76;
            transition: border-color .15s;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: #9b4dca; box-shadow: 0 0 0 2px rgba(155,77,202,.15); }
        input[type="text"]::placeholder { color: #999; }

        /* --- Buttons --- */
        .btn {
            display: inline-block; padding: 10px 24px; font-size: 1.4rem; font-weight: 600;
            border: 1px solid #9b4dca; border-radius: 4px; cursor: pointer;
            transition: background .15s; text-align: center;
        }
        .btn-primary { background: #9b4dca; color: #fff; margin-top: 24px; }
        .btn-primary:hover { background: #7b2fa0; }
        .btn-outline { background: #fff; color: #606c76; border: 1px solid #d1d5db; }
        .btn-outline:hover { background: #f9fafb; border-color: #9b4dca; color: #9b4dca; }

        /* --- Success message --- */
        .success-box {
            max-width: 520px; margin: 48px auto; text-align: center;
            background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 32px;
        }
        .success-box h4 { color: #15803d; margin-bottom: 12px; }
        .success-box p { color: #606c76; font-size: 1.4rem; margin-bottom: 8px; }
        .webhook-url {
            background: #fff; border: 1px solid #d1d5db; border-radius: 4px;
            padding: 12px 16px; font-family: "SF Mono", "Fira Code", Menlo, monospace;
            font-size: 1.3rem; margin: 16px 0; word-break: break-all; color: #222;
        }

        /* --- External log link hint --- */
        .log-hint { color: #999; font-size: 1.2rem; margin: 12px 0 0; }

        /* --- Page title --- */
        .page-title { font-size: 2.4rem; font-weight: 300; color: #222; margin-bottom: 24px; }
        .page-title b { color: #9b4dca; font-weight: 700; }

        /* --- Tags --- */
        .tag { display: inline-flex; align-items: center; background: #f5f3ff; color: #6d28d9; font-size: 1.2rem; font-weight: 600; padding: 3px 10px; border-radius: 6px; letter-spacing: .2px; }
        .tag-add { display: inline-flex; align-items: center; gap: 2px; color: #9b4dca; font-size: 1.2rem; font-weight: 600; padding: 3px 10px; border-radius: 6px; border: 1px dashed #d8b4fe; cursor: pointer; transition: all .15s; background: transparent; }
        .tag-add:hover { background: #f5f3ff; border-color: #9b4dca; }

        /* --- Modal --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal { background: #fff; border-radius: 8px; padding: 28px 32px; max-width: 440px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
        .modal h4 { margin-bottom: 16px; font-size: 1.8rem; }
        .modal-input-row { display: flex; gap: 8px; margin-top: 16px; }
        .modal-input-row input { flex: 1; margin: 0; }

        /* --- Responsive --- */
        @media (max-width: 640px) {
            .steps { grid-template-columns: 1fr; }
            .stat-row { flex-direction: column; gap: 8px; }
            .hero h1 { font-size: 3.2rem; }
            nav { padding: 0 16px; }
            .container { padding: 24px 16px; }
        }
    </style>
</head>
<body>
<nav>
    <a class="brand" href="#/"><img src="/static/logo.svg" alt="neutron" class="logo">neutron</a>
    <a href="#/projects">Projects</a>
    <a href="#/recent">Recent Jobs</a>
    <a href="#/register">Register</a>
    <span style="flex:1"></span>
    <a href="#/help" style="margin-right:0">📖 Help</a>
</nav>
<div id="app" class="container"></div>
<script>
(function() {
    var app = document.getElementById('app');
    var appConfig = { logUrl: '', namespace: 'default', codebaseUrls: {} };

    // --- Config ---
    fetch('/api/config').then(function(r){ return r.json(); }).then(function(c){
        appConfig.logUrl = c.logUrl || '';
        appConfig.namespace = c.namespace || 'default';
        appConfig.codebaseUrls = c.codebaseUrls || {};
    });

    function buildLogUrl(podId) {
        if (!appConfig.logUrl) return '#';
        return appConfig.logUrl.replace('{namespace}', encodeURIComponent(appConfig.namespace)).replace('{podId}', encodeURIComponent(podId));
    }

    function isPodLogExpired(podName) {
        // Pod name format: neutron-{jobName}-{YYYYMMDD-HHMMSS}
        var match = podName.match(/(\d{8}-\d{6})$/);
        if (!match) return false;
        var ts = match[1];
        var y = parseInt(ts.substring(0, 4), 10);
        var m = parseInt(ts.substring(4, 6), 10) - 1;
        var d = parseInt(ts.substring(6, 8), 10);
        var hh = parseInt(ts.substring(9, 11), 10);
        var mm = parseInt(ts.substring(11, 13), 10);
        var ss = parseInt(ts.substring(13, 15), 10);
        var podDate = new Date(y, m, d, hh, mm, ss);
        var diff = Date.now() - podDate.getTime();
        return diff > 7 * 24 * 60 * 60 * 1000;
    }

    function openPodLog(podName, podId) {
        if (!appConfig.logUrl) return;
        if (isPodLogExpired(podName)) {
            alert('非常抱歉，超过7日的日志已被清理，无法查看');
            return;
        }
        window.open(buildLogUrl(podId || podName), '_blank');
    }
    window.openPodLog = openPodLog;

    // --- Router ---
    function route() {
        var hash = location.hash || '#/';
        app.innerHTML = '';
        window.scrollTo(0, 0);

        if (hash === '#/' || hash === '#' || hash === '#/home') {
            renderHome();
        } else if (hash === '#/projects') {
            renderProjects();
        } else if (hash === '#/recent') {
            renderRecentJobs();
        } else if (hash === '#/register') {
            renderRegister();
        } else if (hash === '#/help') {
            renderHelp();
        } else if (hash.startsWith('#/register/success?')) {
            renderRegisterInfo();
        } else if (hash.startsWith('#/status/')) {
            renderStatus(hash.slice('#/status/'.length));
        } else if (hash.startsWith('#/project/')) {
            renderProjectJobs(hash.slice('#/project/'.length));
        } else {
            renderHome();
        }
    }

    window.addEventListener('hashchange', route);
    window.addEventListener('DOMContentLoaded', route);

    // --- SSH to HTTP conversion ---
    function sshToHttp(sshUrl, webhookType) {
        if (!sshUrl) return '';

        // Codeup: ssh://git@codeup.xxx.com:9022/org-id/path/repo.git → http://codeup.xxx.com/codeup/org-id/path/repo
        if (sshUrl.startsWith('ssh://git@codeup')) {
            var hostEnd = sshUrl.indexOf(':9022');
            if (hostEnd > 0) {
                var host = sshUrl.substring(10, hostEnd); // extract "codeup.devops.csdc.com"
                var path = sshUrl.substring(hostEnd + 5).replace(/\.git$/, ''); // skip ":9022"
                return 'http://' + host + '/codeup' + path;
            }
        }

        // GitLab and others: use codebaseUrls from config
        var baseUrl = appConfig.codebaseUrls[webhookType] || '';
        if (!baseUrl) return '';
        baseUrl = baseUrl.replace(/\/+$/, '');

        if (sshUrl.startsWith('ssh://')) {
            // ssh://git@host:port/path.git → baseUrl/path
            var parts = sshUrl.replace('ssh://', '').split(':');
            if (parts.length >= 2) {
                var path = parts[parts.length - 1];
                if (/^\d+\//.test(path)) {
                    path = path.replace(/^\d+\//, '');
                }
                return baseUrl + '/' + path.replace(/\.git$/, '');
            }
        } else if (sshUrl.startsWith('git@')) {
            // git@host:path.git → baseUrl/path
            var colonIdx = sshUrl.indexOf(':');
            if (colonIdx > 0) {
                var path = sshUrl.substring(colonIdx + 1);
                return baseUrl + '/' + path.replace(/\.git$/, '');
            }
        }
        return '';
    }

    // --- Extract repo name from URL ---
    function getRepoName(repoUrl) {
        if (!repoUrl) return '';
        // Remove .git suffix, then take the last path segment
        var url = repoUrl.replace(/\.git$/, '');
        var parts = url.split('/');
        return parts[parts.length - 1] || '';
    }

    // --- Parse job status JSON ---
    function parseJobStatus(statusStr) {
        try { return JSON.parse(statusStr); } catch(e) { return {}; }
    }

    // --- Recent Jobs ---
    var RECENT_PAGE_SIZE = 20;
    var _recentJobs = [];
    var _recentFiltered = [];
    var _recentPage = 0;

    function renderRecentJobs() {
        app.innerHTML =
            '<p class="page-title">Recent <b>Jobs</b> <span style="font-size:1.4rem;color:#999;font-weight:400">(last 7 days)</span></p>' +
            '<div style="margin-bottom:20px">' +
                '<input type="text" id="recentSearchInput" placeholder="Filter by project, job name, or status..." style="max-width:400px">' +
            '</div>' +
            '<div id="recentJobsList"><p style="color:#999">Loading...</p></div>' +
            '<div id="recentPagination" style="text-align:center;margin-top:24px"></div>';

        fetch('/api/jobs/recent')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    document.getElementById('recentJobsList').innerHTML = '<p style="color:#c00">' + escHtml(data.error) + '</p>';
                    return;
                }
                _recentJobs = data.jobs || [];
                _recentFiltered = _recentJobs;
                _recentPage = 0;
                renderRecentJobsPage();

                document.getElementById('recentSearchInput').addEventListener('input', function() {
                    var q = this.value.toLowerCase();
                    if (!q) {
                        _recentFiltered = _recentJobs;
                    } else {
                        _recentFiltered = _recentJobs.filter(function(job) {
                            var st = parseJobStatus(job.Status);
                            var repoName = getRepoName(st.repo_url) || '';
                            var statusText = '';
                            if (st.succeeded > 0) statusText = 'success succeeded';
                            else if (st.failed > 0) statusText = 'fail failed';
                            else if (st.active > 0) statusText = 'running active';
                            else statusText = 'pending';
                            var searchable = [repoName, job.Name || '', st.trigger_type || '', statusText, st.webhook_type || ''].join(' ').toLowerCase();
                            return searchable.indexOf(q) >= 0;
                        });
                    }
                    _recentPage = 0;
                    renderRecentJobsPage();
                });
            })
            .catch(function(err) {
                document.getElementById('recentJobsList').innerHTML = '<p style="color:#c00">Failed to load: ' + escHtml(String(err)) + '</p>';
            });
    }

    function renderRecentJobsPage() {
        var totalPages = Math.ceil(_recentFiltered.length / RECENT_PAGE_SIZE);
        if (totalPages === 0) {
            document.getElementById('recentJobsList').innerHTML = '<p style="color:#999">No jobs found.</p>';
            document.getElementById('recentPagination').innerHTML = '';
            return;
        }

        var start = _recentPage * RECENT_PAGE_SIZE;
        var end = Math.min(start + RECENT_PAGE_SIZE, _recentFiltered.length);
        var pageJobs = _recentFiltered.slice(start, end);

        var html = '<table><thead><tr><th>Status</th><th>Project</th><th>Job Name</th><th>Pod</th><th>Time</th><th></th></tr></thead><tbody>';
        for (var i = 0; i < pageJobs.length; i++) {
            var job = pageJobs[i];
            var st = parseJobStatus(job.Status);
            var statusIcon = '⏳';
            var statusColor = '#999';
            if (st.succeeded > 0) { statusIcon = '✅'; statusColor = '#00cc66'; }
            else if (st.failed > 0) { statusIcon = '❌'; statusColor = '#ff3333'; }
            else if (st.active > 0) { statusIcon = '🔄'; statusColor = '#3399ff'; }

            var repoName = getRepoName(st.repo_url) || job.ProjectId;
            var podName = (job.Pods && job.Pods.length > 0) ? job.Pods[0].PodName : '-';
            var triggerType = st.trigger_type || '-';
            var timeStr = '';
            if (job.CompletedAt) {
                var d = new Date(job.CompletedAt);
                timeStr = d.toLocaleString();
            }

            html += '<tr>';
            html += '<td style="color:' + statusColor + ';font-size:1.8rem">' + statusIcon + '</td>';
            html += '<td><b>' + escHtml(repoName) + '</b></td>';
            html += '<td>' + escHtml(job.Name) + '</td>';
            html += '<td style="font-size:1.3rem;color:#999">' + escHtml(podName) + '</td>';
            html += '<td style="font-size:1.3rem;color:#999">' + escHtml(timeStr) + '</td>';
            html += '<td><a href="#/status/' + escAttr(job.Name) + '" class="btn btn-outline" style="padding:4px 12px;font-size:1.2rem">View</a></td>';
            html += '</tr>';
        }
        html += '</tbody></table>';
        document.getElementById('recentJobsList').innerHTML = html;

        // Pagination controls
        var paginationHtml = '<div style="font-size:1.3rem;color:#999;margin-bottom:8px">Showing ' + (start + 1) + '-' + end + ' of ' + _recentFiltered.length + ' jobs</div>';
        if (totalPages > 1) {
            paginationHtml += '<div style="display:flex;justify-content:center;align-items:center;gap:12px">';
            paginationHtml += '<button class="btn btn-outline" style="padding:6px 16px;font-size:1.3rem"' +
                (_recentPage === 0 ? ' disabled' : '') +
                ' onclick="recentJobsPrevPage()">← Prev</button>';
            paginationHtml += '<span style="font-size:1.3rem;color:#606c76">Page ' + (_recentPage + 1) + ' of ' + totalPages + '</span>';
            paginationHtml += '<button class="btn btn-outline" style="padding:6px 16px;font-size:1.3rem"' +
                (_recentPage >= totalPages - 1 ? ' disabled' : '') +
                ' onclick="recentJobsNextPage()">Next →</button>';
            paginationHtml += '</div>';
        }
        document.getElementById('recentPagination').innerHTML = paginationHtml;
    }

    function recentJobsPrevPage() {
        if (_recentPage > 0) { _recentPage--; renderRecentJobsPage(); }
    }
    function recentJobsNextPage() {
        var totalPages = Math.ceil(_recentFiltered.length / RECENT_PAGE_SIZE);
        if (_recentPage < totalPages - 1) { _recentPage++; renderRecentJobsPage(); }
    }
    window.recentJobsPrevPage = recentJobsPrevPage;
    window.recentJobsNextPage = recentJobsNextPage;

    // --- Help Page ---
    function renderHelp() {
        app.innerHTML =
            '<p class="page-title"><b>Help</b> & Documentation</p>' +
            '<div class="card">' +
                '<h3 style="margin-bottom:16px">Getting Started</h3>' +
                '<ol style="padding-left:20px;line-height:2">' +
                    '<li>Register your project on the <a href="#/register">Register</a> page</li>' +
                    '<li>Copy the webhook URL and configure it in your GitLab/Codeup repository</li>' +
                    '<li>Add a <code>neutron.yaml</code> file to your repository root</li>' +
                    '<li>Push code or create a merge request to trigger the pipeline</li>' +
                '</ol>' +
            '</div>' +
            '<div class="card">' +
                '<h3 style="margin-bottom:16px">neutron.yaml Format</h3>' +
                '<pre style="background:#f8f9fa;padding:20px;border-radius:8px;overflow-x:auto;font-size:1.4rem;line-height:1.6"><code>' +
                escHtml('# neutron.yaml\n\n' +
                'jobs:\n' +
                '  build:                              # Job name\n' +
                '    image: maven:3.9-eclipse-temurin-17  # Docker image\n' +
                '    trigger: [PUSH, MR]                # Trigger events\n' +
                '    resources:                         # Optional resource limits\n' +
                '      limits:\n' +
                '        cpu: "2"\n' +
                '        memory: "4Gi"\n' +
                '      requests:\n' +
                '        cpu: "500m"\n' +
                '        memory: "1Gi"\n' +
                '    steps:\n' +
                '      - name: test\n' +
                '        cmd: mvn test\n' +
                '      - name: build\n' +
                '        cmd: mvn package -DskipTests\n' +
                '\n' +
                '  deploy:                             # Another job\n' +
                '    image: alpine:latest\n' +
                '    trigger: [TAG]                     # Only on tag\n' +
                '    steps:\n' +
                '      - name: deploy\n' +
                '        cmd: echo "Deploying..."') +
                '</code></pre>' +
            '</div>' +
            '<div class="card">' +
                '<h3 style="margin-bottom:16px">Configuration Reference</h3>' +
                '<table style="width:100%;font-size:1.4rem">' +
                    '<thead><tr><th style="text-align:left;padding:8px;border-bottom:2px solid #e5e7eb">Field</th><th style="text-align:left;padding:8px;border-bottom:2px solid #e5e7eb">Description</th><th style="text-align:left;padding:8px;border-bottom:2px solid #e5e7eb">Example</th></tr></thead>' +
                    '<tbody>' +
                        '<tr><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>image</code></td><td style="padding:8px;border-bottom:1px solid #f3f4f6">Docker image for the job</td><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>node:18</code></td></tr>' +
                        '<tr><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>trigger</code></td><td style="padding:8px;border-bottom:1px solid #f3f4f6">Events that trigger the job</td><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>[PUSH, MR, TAG]</code></td></tr>' +
                        '<tr><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>resources.limits.cpu</code></td><td style="padding:8px;border-bottom:1px solid #f3f4f6">Maximum CPU cores</td><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>"2"</code>, <code>"500m"</code></td></tr>' +
                        '<tr><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>resources.limits.memory</code></td><td style="padding:8px;border-bottom:1px solid #f3f4f6">Maximum memory</td><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>"4Gi"</code>, <code>"512Mi"</code></td></tr>' +
                        '<tr><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>resources.requests.cpu</code></td><td style="padding:8px;border-bottom:1px solid #f3f4f6">Requested CPU cores</td><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>"500m"</code></td></tr>' +
                        '<tr><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>resources.requests.memory</code></td><td style="padding:8px;border-bottom:1px solid #f3f4f6">Requested memory</td><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>"1Gi"</code></td></tr>' +
                        '<tr><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>steps[].name</code></td><td style="padding:8px;border-bottom:1px solid #f3f4f6">Step display name</td><td style="padding:8px;border-bottom:1px solid #f3f4f6"><code>build</code></td></tr>' +
                        '<tr><td style="padding:8px"><code>steps[].cmd</code></td><td style="padding:8px">Shell command to execute</td><td style="padding:8px"><code>mvn clean package</code></td></tr>' +
                    '</tbody>' +
                '</table>' +
            '</div>' +
            '<div class="card">' +
                '<h3 style="margin-bottom:16px">Trigger Types</h3>' +
                '<ul style="padding-left:20px;line-height:2">' +
                    '<li><strong>PUSH</strong> — Triggered on git push to any branch</li>' +
                    '<li><strong>MR</strong> — Triggered on merge request creation or update</li>' +
                    '<li><strong>TAG</strong> — Triggered on tag creation</li>' +
                '</ul>' +
            '</div>';
    }

    // --- Projects List ---
    function renderProjects() {
        app.innerHTML =
            '<p class="page-title">Registered <b>Projects</b></p>' +
            '<div style="margin-bottom:20px">' +
                '<input type="text" id="searchInput" placeholder="Filter by repository URL..." style="max-width:400px">' +
            '</div>' +
            '<div id="projectsList"><p style="color:#999">Loading...</p></div>';

        fetch('/api/projects')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    document.getElementById('projectsList').innerHTML = '<p style="color:#c00">' + escHtml(data.error) + '</p>';
                    return;
                }
                window._projects = data.projects || [];
                renderProjectsList(window._projects);

                document.getElementById('searchInput').addEventListener('input', function() {
                    var q = this.value.toLowerCase();
                    var filtered = window._projects.filter(function(p) {
                        return !q || (p.RepoUrl && p.RepoUrl.toLowerCase().indexOf(q) >= 0);
                    });
                    renderProjectsList(filtered);
                });
            })
            .catch(function(err) {
                document.getElementById('projectsList').innerHTML = '<p style="color:#c00">Failed to load: ' + escHtml(String(err)) + '</p>';
            });
    }

    function renderProjectsList(projects) {
        var el = document.getElementById('projectsList');
        if (!projects || projects.length === 0) {
            el.innerHTML = '<p style="color:#999">No projects registered. <a href="#/register">Create one</a></p>';
            return;
        }

        var html = '<table><thead><tr><th>Type</th><th>Name</th><th>Repository</th><th>Actions</th></tr></thead><tbody>';
        for (var i = 0; i < projects.length; i++) {
            var p = projects[i];
            var httpUrl = sshToHttp(p.RepoUrl, p.WebhookType);
            var repoName = getRepoName(p.RepoUrl);
            var repoHtml = httpUrl
                ? '<a target="_blank" href="' + escAttr(httpUrl) + '">' + escHtml(p.RepoUrl) + '</a>'
                : escHtml(p.RepoUrl);
            html += '<tr><td>' + escHtml(p.WebhookType) + '</td><td><b>' + escHtml(repoName) + '</b></td><td>' + repoHtml + '</td><td><a href="#/project/' + escAttr(p.Id) + '" class="btn btn-outline" style="padding:6px 16px;font-size:1.3rem">View</a></td></tr>';
        }
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    // --- Project Jobs ---
    function renderProjectJobs(projectId) {
        app.innerHTML =
            '<p class="page-title">Pipeline history</p>' +
            '<div style="margin-bottom:16px"><a href="#/projects" class="btn btn-outline" style="padding:6px 16px;font-size:1.3rem">← Back to Projects</a></div>' +
            '<div id="projectInfo"></div>' +
            '<div id="jobsList"><p style="color:#999">Loading...</p></div>';

        Promise.all([
            fetch('/api/projects').then(function(r) { return r.json(); }),
            fetch('/api/projects/' + encodeURIComponent(projectId) + '/jobs').then(function(r) { return r.json(); }),
            fetch('/api/projects/' + encodeURIComponent(projectId) + '/recipients').then(function(r) { return r.json(); })
        ]).then(function(results) {
            var projects = results[0].projects || [];
            var project = null;
            for (var i = 0; i < projects.length; i++) {
                if (projects[i].Id === projectId) { project = projects[i]; break; }
            }

            // Display project info + recipients tags
            var infoEl = document.getElementById('projectInfo');
            if (project) {
                var httpUrl = sshToHttp(project.RepoUrl, project.WebhookType);
                var repoName = getRepoName(project.RepoUrl);
                var repoHtml = httpUrl
                    ? '<a target="_blank" href="' + escAttr(httpUrl) + '">' + escHtml(project.RepoUrl) + '</a>'
                    : escHtml(project.RepoUrl);
                var recipients = results[2].recipients || [];
                var tagsHtml = '';
                for (var i = 0; i < recipients.length; i++) {
                    tagsHtml += '<span class="tag">' + escHtml(recipients[i].user_id) + '</span>';
                }
                tagsHtml += '<span class="tag-add" onclick="openRecipientsModal(\'' + escAttr(projectId) + '\')">+ Edit</span>';
                infoEl.innerHTML =
                    '<div class="card" style="margin-bottom:16px">' +
                        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">' +
                            '<span style="font-size:1.6rem;font-weight:700;color:#2d3748">' + escHtml(repoName) + '</span>' +
                            '<span style="font-size:1.2rem;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-left:8px">' + escHtml(project.WebhookType) + '</span>' +
                        '</div>' +
                        '<div style="margin-bottom:12px">' +
                            '<span style="font-size:1.3rem;color:#606c76">' + repoHtml + '</span>' +
                        '</div>' +
                        '<div style="border-top:1px solid #f3f4f6;padding-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
                            '<span style="font-size:1.2rem;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px">Notify</span>' +
                            '<div id="projectRecipientTags" style="display:flex;flex-wrap:wrap;align-items:center;gap:6px">' + tagsHtml + '</div>' +
                        '</div>' +
                    '</div>';
            }

            // Display jobs
            var jobsData = results[1];
            if (jobsData.error) {
                document.getElementById('jobsList').innerHTML = '<p style="color:#c00">' + escHtml(jobsData.error) + '</p>';
                return;
            }
            renderProjectJobsList(jobsData.jobs || []);
        }).catch(function(err) {
            document.getElementById('jobsList').innerHTML = '<p style="color:#c00">Failed to load: ' + escHtml(String(err)) + '</p>';
        });
    }

    // --- Recipients Modal ---
    function openRecipientsModal(projectId) {
        // Overlay
        var overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.id = 'recipientsModal';
        overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

        var modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML =
            '<h4>Notification Recipients</h4>' +
            '<div id="modalRecipientsList"><p style="color:#999;font-size:1.3rem">Loading...</p></div>' +
            '<div class="modal-input-row">' +
                '<input type="text" id="modalRecipientInput" placeholder="Enter user ID...">' +
                '<button class="btn btn-outline" id="modalAddBtn" style="margin:0;padding:8px 16px;font-size:1.3rem">Add</button>' +
            '</div>';
        overlay.appendChild(modal);
        document.body.appendChild(overlay);

        function refreshModalList() {
            fetch('/api/projects/' + encodeURIComponent(projectId) + '/recipients')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var list = data.recipients || [];
                    var el = document.getElementById('modalRecipientsList');
                    if (!el) return;
                    if (list.length === 0) {
                        el.innerHTML = '<p style="color:#999;font-size:1.3rem">No recipients configured.</p>';
                    } else {
                        var html = '';
                        for (var i = 0; i < list.length; i++) {
                            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6">' +
                                '<span style="font-size:1.4rem;color:#222">' + escHtml(list[i].user_id) + '</span>' +
                                '<a href="javascript:void(0)" style="color:#dc2626;font-size:1.2rem;font-weight:600" ' +
                                'onclick="removeRecipientFromModal(\'' + escAttr(projectId) + '\',' + list[i].id + ')">Remove</a></div>';
                        }
                        el.innerHTML = html;
                    }
                });
        }
        refreshModalList();

        var btn = document.getElementById('modalAddBtn');
        var input = document.getElementById('modalRecipientInput');
        btn.onclick = function() {
            var userId = input.value.trim();
            if (!userId) return;
            fetch('/api/projects/' + encodeURIComponent(projectId) + '/recipients', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) { alert(data.error); return; }
                input.value = '';
                refreshModalList();
                refreshProjectTags(projectId);
            })
            .catch(function(err) { alert('Request failed: ' + err); });
        };
        input.onkeydown = function(e) { if (e.key === 'Enter') btn.onclick(); };
        input.focus();
    }
    window.openRecipientsModal = openRecipientsModal;

    function removeRecipientFromModal(projectId, rid) {
        fetch('/api/projects/' + encodeURIComponent(projectId) + '/recipients/' + rid, { method: 'DELETE' })
            .then(function(r) { return r.json(); })
            .then(function() {
                // Refresh modal list
                var el = document.getElementById('modalRecipientsList');
                if (el) {
                    fetch('/api/projects/' + encodeURIComponent(projectId) + '/recipients')
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            var list = data.recipients || [];
                            if (list.length === 0) {
                                el.innerHTML = '<p style="color:#999;font-size:1.3rem">No recipients configured.</p>';
                            } else {
                                var html = '';
                                for (var i = 0; i < list.length; i++) {
                                    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6">' +
                                        '<span style="font-size:1.4rem;color:#222">' + escHtml(list[i].user_id) + '</span>' +
                                        '<a href="javascript:void(0)" style="color:#dc2626;font-size:1.2rem;font-weight:600" ' +
                                        'onclick="removeRecipientFromModal(\'' + escAttr(projectId) + '\',' + list[i].id + ')">Remove</a></div>';
                                }
                                el.innerHTML = html;
                            }
                        });
                }
                refreshProjectTags(projectId);
            });
    }
    window.removeRecipientFromModal = removeRecipientFromModal;

    function refreshProjectTags(projectId) {
        fetch('/api/projects/' + encodeURIComponent(projectId) + '/recipients')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var tagsEl = document.getElementById('projectRecipientTags');
                if (!tagsEl) return;
                var recipients = data.recipients || [];
                var html = '';
                for (var i = 0; i < recipients.length; i++) {
                    html += '<span class="tag">' + escHtml(recipients[i].user_id) + '</span>';
                }
                html += '<span class="tag-add" onclick="openRecipientsModal(\'' + escAttr(projectId) + '\')">+ Edit</span>';
                tagsEl.innerHTML = html;
            });
    }

    function renderProjectJobsList(jobs) {
        var el = document.getElementById('jobsList');
        if (!jobs || jobs.length === 0) {
            el.innerHTML = '<p style="color:#999">No pipeline runs in the last 7 days.</p>';
            return;
        }

        var html = '<table><thead><tr><th>Job Name</th><th>Status</th><th>Trigger</th><th>Actions</th></tr></thead><tbody>';
        for (var i = 0; i < jobs.length; i++) {
            var job = jobs[i];
            var status = {};
            try { status = JSON.parse(job.Status || '{}'); } catch(e) {}
            var statusHtml = '';
            if (status.active > 0) {
                statusHtml = '<span style="color:#2563eb">Running</span>';
            } else if (status.failed > 0) {
                statusHtml = '<span style="color:#dc2626">Failed</span>';
            } else if (status.succeeded > 0) {
                statusHtml = '<span style="color:#16a34a">Success</span>';
            } else {
                statusHtml = '<span style="color:#999">Unknown</span>';
            }
            html += '<tr><td><a href="#/status/' + escAttr(job.Name) + '">' + escHtml(job.Name) + '</a></td><td>' + statusHtml + '</td><td>' + escHtml(status.trigger_type || '-') + '</td><td><a href="#/status/' + escAttr(job.Name) + '" class="btn btn-outline" style="padding:4px 12px;font-size:1.2rem">Detail</a></td></tr>';
        }
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    // --- Home ---
    function renderHome() {
        app.innerHTML =
            '<div class="hero">' +
                '<img src="/static/logo.svg" alt="neutron" class="hero-logo">' +
                '<h1>neutron</h1>' +
                '<p>a lightweight pipeline system based on kubernetes</p>' +
            '</div>' +
            '<div class="arch-banner">' +
                '<img src="/static/arch.svg" alt="neutron architecture">' +
            '</div>' +
            '<div class="container" style="padding-top:0">' +
                '<p class="steps-title">Enjoy neutron pipeline in 3 steps</p>' +
                '<div class="steps">' +
                    '<div class="step">' +
                        '<p class="step-num">1</p>' +
                        'Define a pipeline with <b>neutron.yaml</b>' +
                        '<pre>jobs:\n  neutron-build:\n    image: "golang:latest"\n    trigger: ["MR","PUSH"]\n    steps:\n      - name: "build"\n        cmd: "make cli api"</pre>' +
                    '</div>' +
                    '<div class="step">' +
                        '<p class="step-num">2</p>' +
                        '<p>Register a new pipeline in neutron system.</p>' +
                        '<p>Add neutron public key to your code base.</p>' +
                        '<a href="#/register" class="btn btn-primary" style="margin-top:16px">Create pipeline</a>' +
                    '</div>' +
                    '<div class="step">' +
                        '<p class="step-num">3</p>' +
                        '<p>Configure webhook trigger.</p>' +
                        '<p>PUSH, MERGE and TAG are supported now.</p>' +
                    '</div>' +
                '</div>' +
                '<div class="footer">Designed with &hearts; by Shi Mengjie. Licensed under the GPLv3 License.</div>' +
            '</div>';
    }

    // --- Register ---
    function renderRegister() {
        var optionsHtml = '';
        var types = Object.keys(appConfig.codebaseUrls);
        for (var i = 0; i < types.length; i++) {
            optionsHtml += '<option value="' + escAttr(types[i]) + '">' + escHtml(types[i]) + '</option>';
        }
        if (!optionsHtml) {
            optionsHtml = '<option value="GitLab">GitLab</option><option value="Codeup">Codeup</option>';
        }
        app.innerHTML =
            '<div class="form-wrap">' +
                '<h3>Create new pipeline</h3>' +
                '<form id="registerForm">' +
                    '<label for="webhookType">Type</label>' +
                    '<select id="webhookType" name="webhookType">' +
                        optionsHtml +
                    '</select>' +
                    '<label for="repoUrl">Repo URL (SSH protocol only)</label>' +
                    '<input type="text" id="repoUrl" name="repoUrl" placeholder="git@gitlab.example.com:group/project.git">' +
                    '<button class="btn btn-primary" type="submit">Create pipeline</button>' +
                '</form>' +
            '</div>';

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var webhookType = document.getElementById('webhookType').value;
            var repoUrl = document.getElementById('repoUrl').value;
            if (!repoUrl) { alert('Please enter a repo URL'); return; }

            var body = 'webhookType=' + encodeURIComponent(webhookType) + '&repoUrl=' + encodeURIComponent(repoUrl);
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) { alert('Error: ' + data.error); return; }
                sessionStorage.setItem('registerResult', JSON.stringify(data));
                location.hash = '#/register/success?done';
            })
            .catch(function(err) { alert('Request failed: ' + err); });
        });
    }

    // --- Register Info ---
    function renderRegisterInfo() {
        var raw = sessionStorage.getItem('registerResult');
        if (!raw) { location.hash = '#/register'; return; }
        var data = JSON.parse(raw);

        app.innerHTML =
            '<div class="success-box">' +
                '<h4>New Pipeline Created</h4>' +
                '<p>You have created a <b>' + escHtml(data.webhookType) + '</b> pipeline for project <b>' + escHtml(data.repoUrl) + '</b>.</p>' +
                '<p><b>ATTENTION: this page will not show again!</b> Please copy following webhook url.</p>' +
                '<div class="webhook-url" id="webhookUrl">' + escHtml(data.webhookUrl) + '</div>' +
                '<button class="btn btn-outline" id="copyBtn">Copy</button>' +
            '</div>';

        document.getElementById('copyBtn').addEventListener('click', function() {
            var btn = this;
            navigator.clipboard.writeText(data.webhookUrl).then(function() {
                btn.textContent = 'Copied';
            }).catch(function() {
                var range = document.createRange();
                range.selectNode(document.getElementById('webhookUrl'));
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
            });
        });

        sessionStorage.removeItem('registerResult');
    }

    // --- Status ---
    function renderStatus(jobName) {
        app.innerHTML =
            '<p class="page-title">Loading status for <b>' + escHtml(jobName) + '</b>...</p>';

        fetch('/api/status/' + encodeURIComponent(jobName))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    app.innerHTML = '<p class="page-title">Error</p><p>' + escHtml(data.error) + '</p>';
                    return;
                }
                // Always use renderStatusLive since we now always have job and pods
                renderStatusLive(data.job, data.pods, data.status);
            })
            .catch(function(err) {
                app.innerHTML = '<p class="page-title">Error</p><p>' + escHtml(String(err)) + '</p>';
            });
    }

    function renderStatusSolid(jobName, status, pods) {
        var podsHtml = '';
        for (var i = 0; i < pods.length; i++) {
            if (appConfig.logUrl) {
                podsHtml += '<tr><td><a href="javascript:void(0)" onclick="openPodLog(\'' + escAttr(pods[i].Name) + '\')">' + escHtml(pods[i].Name) + '</a></td><td>' + escHtml(pods[i].Status) + '</td></tr>';
            } else {
                podsHtml += '<tr><td>' + escHtml(pods[i].Name) + '</td><td>' + escHtml(pods[i].Status) + '</td></tr>';
            }
        }

        app.innerHTML =
            '<p class="page-title">Job &mdash; <b>' + escHtml(jobName) + '</b></p>' +
            '<div class="card">' +
                '<div class="meta">' +
                    '<div>A <b>' + escHtml(status.WebhookType) + '</b> &rarr; <b>' + escHtml(status.TriggerType) + '</b> pipeline</div>' +
                    '<div><a target="_blank" href="' + escAttr(status.ProjectUrl) + '">' + escHtml(status.RepoUrl) + '</a></div>' +
                '</div>' +
                '<div class="stat-row">' +
                    '<div class="stat">Active: <b>' + (status.Active || 0) + '</b></div>' +
                    '<div class="stat">Succeeded: <b>' + (status.Succeeded || 0) + '</b></div>' +
                    '<div class="stat">Failed: <b>' + (status.Failed || 0) + '</b></div>' +
                '</div>' +
                (pods.length > 0 ?
                    '<table><thead><tr><th>Pod</th><th>Status</th></tr></thead><tbody>' + podsHtml + '</tbody></table>'
                    : '<p style="color:#999;margin-top:12px">No pods recorded.</p>') +
                (appConfig.logUrl ? '<p class="log-hint">Click pod name to view logs on external platform</p>' : '') +
            '</div>';
    }

    function renderStatusLive(job, podsData, dbStatus) {
        var ann = job && job.metadata && job.metadata.annotations ? job.metadata.annotations : {};
        var st = job ? (job.status || {}) : {};
        var items = podsData && podsData.items ? podsData.items : [];

        // Use database status if available, otherwise derive from K8s
        // Note: dbStatus uses lowercase keys (from JSON), K8s uses PascalCase
        var status = dbStatus || {};
        var active = status.active || st.Active || 0;
        var succeeded = status.succeeded || st.Succeeded || 0;
        var failed = status.failed || st.Failed || 0;
        var webhookType = status.webhook_type || ann.sourceType || '';
        var triggerType = status.trigger_type || ann.triggerType || '';
        var repoUrl = status.repo_url || ann.gitPath || '';
        var projectUrl = status.project_url || ann.sourceLink || '#';

        var podsHtml = '';
        for (var i = 0; i < items.length; i++) {
            var pod = items[i];
            var name = pod.metadata ? pod.metadata.name : '';
            var uid = pod.metadata ? pod.metadata.uid : '';
            var phase = pod.status ? pod.status.phase : '';
            if (appConfig.logUrl) {
                podsHtml += '<tr><td><a href="javascript:void(0)" onclick="openPodLog(\'' + escAttr(name) + '\',\'' + escAttr(uid) + '\')">' + escHtml(name) + '</a></td><td>' + escHtml(phase) + '</td></tr>';
            } else {
                podsHtml += '<tr><td>' + escHtml(name) + '</td><td>' + escHtml(phase) + '</td></tr>';
            }
        }

        app.innerHTML =
            '<p class="page-title">Job &mdash; <b>' + escHtml(job && job.metadata ? job.metadata.name : '') + '</b></p>' +
            '<div class="card">' +
                '<div class="meta">' +
                    '<div>A <b>' + escHtml(webhookType) + '</b> &rarr; <b>' + escHtml(triggerType) + '</b> pipeline</div>' +
                    '<div><a target="_blank" href="' + escAttr(projectUrl) + '">' + escHtml(repoUrl) + '</a></div>' +
                '</div>' +
                '<div class="stat-row">' +
                    '<div class="stat">Active: <b>' + active + '</b></div>' +
                    '<div class="stat">Succeeded: <b>' + succeeded + '</b></div>' +
                    '<div class="stat">Failed: <b>' + failed + '</b></div>' +
                '</div>' +
                (items.length > 0 ?
                    '<table><thead><tr><th>Pod</th><th>Status</th></tr></thead><tbody>' + podsHtml + '</tbody></table>'
                    : '<p style="color:#999;margin-top:12px">No pods found.</p>') +
                (appConfig.logUrl ? '<p class="log-hint">Click pod name to view logs on external platform</p>' : '') +
            '</div>';
    }

    // --- Utils ---
    function escHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(String(s)));
        return d.innerHTML;
    }

    function escAttr(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
})();
</script>
