apiVersion: v1
kind: ServiceAccount
metadata:
  name: neutron
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: neutron
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: neutron
subjects:
  - kind: ServiceAccount
    name: neutron
    namespace: default
roleRef:
  kind: ClusterRole
  name: neutron
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neutron-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neutron-api
  template:
    metadata:
      labels:
        app: neutron-api
    spec:
      serviceAccountName: neutron
      containers:
        - name: neutron-api
          image: neutron-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
      volumes:
        - name: kubeconfig
          secret:
            secretName: neutron-kubeconfig
            optional: true
            items:
              - key: config
                path: config
